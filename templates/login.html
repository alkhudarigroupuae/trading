<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alkhudari Trading</title>
    
    <!-- Bootstrap CSS with Replit theme -->
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #0A0A0A;
            border: 1px solid #ed7430;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 12px rgba(237, 116, 48, 0.1);
        }
        .btn-brand {
            background-color: #ed7430;
            color: #000;
            font-weight: bold;
            border: none;
        }
        .btn-brand:hover {
            background-color: #d66528;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='alkhudari-logo.png') }}" alt="Alkhudari Logo" style="height: 80px; object-fit: contain;">
            <h4 class="mt-3" style="color: #ed7430;">Secure Trading Terminal</h4>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="password" class="form-label">Terminal Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="fas fa-lock" style="color: #ed7430;"></i></span>
                    <input type="password" class="form-control bg-dark border-secondary text-light" id="password" name="password" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn btn-brand w-100 mt-3">Access Terminal</button>
        </form>
    </div>
</body>
</html>
